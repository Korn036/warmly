<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sovenn · keep your people warm</title>
<meta name="description" content="A simple personal CRM to remember the people who matter, never miss a birthday, and keep warm contacts from going cold.">
<meta name="theme-color" content="#FBF8F3">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="wrap">
    <a class="brand" href="#today" aria-label="Sovenn home"><span class="brandname">Sovenn<span class="dot">.</span></span><span class="ver" id="brandVer"></span></a>
    <nav class="tabs" id="tabs">
      <a data-go="today">Today</a>
      <a data-go="people">People</a>
      <a data-go="map">Map</a>
      <a data-go="mycard">My Card</a>
      <a data-go="settings">Settings</a>
    </nav>
    <button class="icon-btn" id="themeBtn" aria-label="switch skin">D</button>
    <button class="icon-btn menu" id="menuBtn" aria-label="menu">☰</button>
  </div>
</header>

<main class="wrap" id="app"><!-- rendered by app.js --></main>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<div class="lockscreen" id="lockScreen"></div>

<svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden"><defs>
  <filter id="liquid" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.008 0.013" numOctaves="3" seed="7" result="n">
      <animate attributeName="baseFrequency" dur="28s" values="0.008 0.013;0.013 0.009;0.008 0.013" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="90" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<div class="fab-wrap">
  <button class="fab" id="fabBtn" aria-label="Add a contact" onclick="captureHub()">+</button>
</div>
<input type="file" id="cardCam" accept="image/*" capture="environment" style="display:none" onchange="cardCaptured(event)">

<button class="fb-fab" id="fbFab" onclick="feedbackOpen()" aria-label="Send beta feedback" hidden>
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.55L3 21l2-5.5A8.5 8.5 0 1 1 21 11.5z"/></svg><span>Feedback</span>
</button>
<div class="fb-bg" id="fbBg" hidden onclick="if(event.target===this)feedbackClose()"></div>

<footer class="foot wrap">
  <span>Sovenn keeps your people on your device. No server, no tracking. Nothing is sent to anyone until you tap send.</span><br>
  <a href="privacy.html" style="color:var(--ink-soft)">Privacy</a> · <a href="terms.html" style="color:var(--ink-soft)">Terms</a> · © 2026 Karthik Onteddu
</footer>

<script src="qr.js"></script>
<script src="capture.js"></script>
<script src="shuffle.js"></script>
<script src="memory.js"></script>
<script src="streak.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
