<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Warmly · keep your people warm</title>
<meta name="description" content="A simple personal CRM to remember the people who matter, never miss a birthday, and keep warm contacts from going cold.">
<meta name="theme-color" content="#E2613C">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%230E3B2E'/%3E%3Ccircle cx='24' cy='27' r='8' fill='%23F4C04A'/%3E%3Ccircle cx='42' cy='30' r='6.5' fill='%23F6E7C8'/%3E%3C/svg%3E">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="wrap">
    <a class="brand" href="#today" aria-label="Warmly home">Warmly<span class="dot">.</span></a>
    <nav class="tabs" id="tabs">
      <a data-go="today">Today</a>
      <a data-go="people">People</a>
      <a data-go="map">Map</a>
      <a data-go="mycard">My Card</a>
      <a data-go="import">Import</a>
      <a data-go="templates">Templates</a>
      <a data-go="settings">Settings</a>
    </nav>
    <button class="icon-btn" id="themeBtn" aria-label="switch skin">D</button>
    <button class="icon-btn menu" id="menuBtn" aria-label="menu">☰</button>
  </div>
</header>

<main class="wrap" id="app"><!-- rendered by app.js --></main>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<div class="fab-wrap">
  <div class="fab-menu" id="fabMenu">
    <button class="fab-opt" onclick="fabPick('camera')">Scan a card</button>
    <button class="fab-opt" onclick="fabPick('voice')">Speak it</button>
    <button class="fab-opt" onclick="fabPick('manual')">Type it</button>
  </div>
  <button class="fab" id="fabBtn" aria-label="Add a contact" onclick="fabToggle()">+</button>
</div>
<input type="file" id="cardCam" accept="image/*" capture="environment" style="display:none" onchange="cardCaptured(event)">

<footer class="foot wrap">
  <span>Warmly keeps everything on this device. Nothing is sent to anyone until you tap send.</span><br>
  <a href="privacy.html" style="color:var(--ink-soft)">Privacy</a> · <a href="terms.html" style="color:var(--ink-soft)">Terms</a> · © 2026 Karthik Onteddu
</footer>

<script src="qr.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
