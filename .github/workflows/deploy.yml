name: Deploy to Cloudflare Workers

# Deploys sovenn.app (the "warmly" static-assets Worker) ONLY after the `ci` workflow
# succeeds on main. This is meant to be the SINGLE source of truth for deploys — the
# Cloudflare Workers-Builds git integration and any legacy Pages project must be
# disconnected in the dashboard so this cannot race them (see the 2026-07-02 deploy
# post-mortem: multiple concurrent deploy paths are what broke v0.63.0).

on:
  workflow_run:
    workflows: [ci]          # must match ci.yml's `name: ci`
    types: [completed]
    branches: [main]

# Never run two deploys at once; a newer run cancels an in-flight older one.
concurrency:
  group: deploy-sovenn-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    # workflow_run fires even when CI FAILS — only deploy on a green run.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy the exact commit CI validated, not whatever is newest on main.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Deploy to Cloudflare (pinned wrangler major)
        run: npx --yes wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Prove the deploy actually went live. The v0.63.0 incident was a SILENT stale
      # deploy: live sat on an old build for ~a day with no signal. This reads the VERSION
      # we just shipped from app.js, then polls the live edge (cache-busted) until it
      # matches — and FAILS RED if it never does. Silent staleness becomes a loud alarm.
      - name: Verify sovenn.app serves the deployed VERSION
        run: |
          expect=$(grep -oE "VERSION[[:space:]]*=[[:space:]]*['\"][0-9]+\.[0-9]+\.[0-9]+" app.js | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1 || true)
          if [ -z "$expect" ]; then echo "::error::could not parse VERSION from app.js"; exit 1; fi
          echo "Deployed VERSION = $expect; polling https://sovenn.app/app.js ..."
          for attempt in $(seq 1 6); do
            live=$(curl -fsSL "https://sovenn.app/app.js?ci=${GITHUB_RUN_ID}" | grep -oE "VERSION[[:space:]]*=[[:space:]]*['\"][0-9]+\.[0-9]+\.[0-9]+" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1 || true)
            echo "  attempt ${attempt}: live = ${live:-<none>}"
            if [ "$live" = "$expect" ]; then echo "VERIFIED: sovenn.app is live on $expect"; exit 0; fi
            sleep 10
          done
          echo "::error::sovenn.app VERSION (${live:-<none>}) != deployed ($expect) after 6 tries — stale or failed deploy"
          exit 1
